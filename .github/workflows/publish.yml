name: Publish to GitHub Packages

# Publishes on any pushed `v*` tag, e.g. `git tag v1.0.2 && git push --tags`.
# Can also be run manually (workflow_dispatch) — defaults to a dry-run pack so
# you can inspect the tarball without publishing.
on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Run npm pack --dry-run instead of actually publishing"
        type: boolean
        required: true
        default: true
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@tomscaria'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Dry-run pack (inspect tarball contents)
        run: npm pack --dry-run

      - name: Publish
        if: ${{ github.event_name == 'push' || inputs.dry-run == false }}
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
