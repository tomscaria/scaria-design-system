name: Release

# Public-npm release pipeline (changesets → npmjs.org).
#
# Flow:
#   - Push to main WITH pending .changeset/*.md  -> opens/updates a
#     "chore: version packages" PR (bumps versions + writes CHANGELOG).
#   - Push to main with NO pending changesets     -> runs `changeset publish`,
#     which publishes any package whose version is not yet on the registry.
#
# Prerequisite (one-time, must be done in repo settings — cannot be scripted):
#   - Add an NPM_TOKEN repo secret: an npmjs.org *automation* token for an
#     account that owns (or can publish to) the @tomscaria scope.
#   Until NPM_TOKEN exists, the release step is SKIPPED (the job is a green
#   no-op), so enabling this workflow does not create red runs on main.
#
# Registry note: package.json has publishConfig.access=public and no registry,
# so `changeset publish` targets npmjs.org (public, no token needed to INSTALL).
# publish.yml (GitHub Packages, on v* tags) remains as a manual/mirror path.
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: "https://registry.npmjs.org"

      - name: Install
        run: npm ci

      - name: Build derived
        run: npm run build

      # Direct, idempotent publish. Skipped until NPM_TOKEN is set (green no-op).
      # Publishes the current package.json version only if it isn't already on
      # npm, so re-runs are safe. Prints npm whoami to surface auth/scope issues.
      - name: Publish to npm
        if: ${{ env.NPM_TOKEN != '' }}
        run: |
          set -euo pipefail
          echo "authenticated as: $(npm whoami || echo '(whoami FAILED — bad token)')"
          PKG=$(node -p "require('./package.json').name")
          VER=$(node -p "require('./package.json').version")
          echo "target: $PKG@$VER"
          if npm view "$PKG@$VER" version >/dev/null 2>&1; then
            echo "$PKG@$VER already published — skipping."
          else
            npm publish --access public
            echo "published $PKG@$VER"
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
