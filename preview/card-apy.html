<!doctype html>
<html lang="en"><head><meta charset="utf-8"/>
<title>Card · APY · Lore</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<link rel="stylesheet" href="theme-switcher.css"/>
<link rel="stylesheet" href="_preview-base.css"/>
<link rel="stylesheet" href="_primitives.css"/>
<style>
  .apy-card{background:var(--accent);color:var(--accent-fg);border-radius:var(--r-lg);padding:20px;box-shadow:var(--shadow-md)}
  .apy-card .eyebrow{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:currentColor;opacity:.75;margin-bottom:10px;font-family:var(--font-mono)}
  .apy-card .big{font-family:var(--font-display);font-size:48px;line-height:1;letter-spacing:-.02em;font-weight:500;font-variant-numeric:tabular-nums slashed-zero}
  .apy-card .sub{font-size:13px;color:currentColor;opacity:.85;margin-top:14px;font-family:var(--font-mono)}
  .apy-card .dot{width:8px;height:8px;border-radius:999px;background:currentColor;display:inline-block;margin-right:6px;vertical-align:middle}
  .apy-card .mini{display:flex;align-items:center;gap:10px;padding:10px 12px;background:color-mix(in oklab,currentColor 14%,transparent);border-radius:var(--r-md);font-family:var(--font-mono);font-size:12px;color:currentColor;margin-top:14px}

  .apy-card.soft{background:color-mix(in oklab,var(--accent) 12%,var(--bg-2));color:var(--fg);border:1px solid color-mix(in oklab,var(--accent) 22%,var(--line))}
  .apy-card.soft .eyebrow{color:var(--fg-3);opacity:1}
  .apy-card.soft .sub{color:var(--fg-3);opacity:1}
  .apy-card.soft .mini{background:var(--bg-3);color:var(--fg-2)}

  .apy-card.outline{background:var(--bg-2);color:var(--fg);border:1px solid var(--line);box-shadow:var(--shadow-sm)}
  .apy-card.outline .eyebrow{color:var(--fg-3);opacity:1}
  .apy-card.outline .big{color:var(--accent-deep,var(--accent))}
  .apy-card.outline .sub{color:var(--fg-3);opacity:1}
  .apy-card.outline .mini{background:var(--bg-3);color:var(--fg-2)}
</style></head><body data-theme="lore-light">

<section>
  <h4>APY card · primary yield surface</h4>
  <div class="grid-3">
    <div class="apy-card">
      <div class="eyebrow">Save vault · APY</div>
      <div class="big">5.24%</div>
      <div class="sub"><span class="dot"></span>Delegated · Aave v3 · Circle</div>
      <div class="mini">earn · 0.014% / day</div>
    </div>

    <div class="apy-card soft">
      <div class="eyebrow">Save vault · APY</div>
      <div class="big">5.24%</div>
      <div class="sub"><span class="dot" style="background:var(--accent)"></span>Delegated · Aave v3 · Circle</div>
      <div class="mini">earn · 0.014% / day</div>
    </div>

    <div class="apy-card outline">
      <div class="eyebrow">Save vault · APY</div>
      <div class="big">5.24%</div>
      <div class="sub"><span class="dot" style="background:var(--accent-deep,var(--accent))"></span>Delegated · Aave v3 · Circle</div>
      <div class="mini">earn · 0.014% / day</div>
    </div>
  </div>
</section>

<script src="theme-switcher.js" defer></script>
</body></html>
