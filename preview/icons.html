<!doctype html>
<html lang="en"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../tokens/colors_and_type.css"/>
<link rel="stylesheet" href="theme-switcher.css"/>
<style>
  body{margin:0;background:var(--bg);padding:64px 20px 24px;font-family:var(--font-sans);color:var(--fg);min-height:100vh}
  h4{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--fg-3);margin:0 0 12px;font-weight:600;font-family:var(--font-mono)}
  section{margin-bottom:26px}
  .grid{display:grid;grid-template-columns:repeat(8,1fr);gap:8px}
  .cell{display:flex;flex-direction:column;align-items:center;gap:6px;padding:14px 8px;background:var(--bg-2);border:1px solid var(--line);border-radius:var(--r-md);color:var(--fg)}
  .cell svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.75;stroke-linecap:round;stroke-linejoin:round}
  .cell img{width:20px;height:20px}
  /* paint imported SVGs with currentColor via mask so they inherit theme fg */
  .cell .ico{width:20px;height:20px;background:currentColor;display:block;
    -webkit-mask-repeat:no-repeat;mask-repeat:no-repeat;
    -webkit-mask-size:contain;mask-size:contain;
    -webkit-mask-position:center;mask-position:center}
  .lab{font-size:9px;color:var(--fg-3);font-family:var(--font-mono);text-align:center;line-height:1.2}

  .swatch{display:grid;grid-template-columns:repeat(6,1fr);gap:10px}
  .sw{display:flex;flex-direction:column;gap:6px;align-items:center;padding:16px 10px;border:1px solid var(--line);border-radius:var(--r-md)}
  .sw.b1{background:var(--bg)}
  .sw.b2{background:var(--bg-2)}
  .sw.b3{background:var(--bg-3)}
  .sw.bi{background:var(--fg);color:var(--bg)}
  .sw.br{background:var(--brand);color:var(--brand-fg)}
  .sw.ac{background:var(--accent);color:var(--accent-fg)}
  .sw .ico{width:22px;height:22px;background:currentColor;display:block;-webkit-mask-repeat:no-repeat;mask-repeat:no-repeat;-webkit-mask-size:contain;mask-size:contain;-webkit-mask-position:center;mask-position:center}
  .sw .n{font-size:10px;font-family:var(--font-mono);opacity:.75}
</style></head><body data-theme="earth-light">

<section>
  <h4>Icon set · inherits <code style="font-family:var(--font-mono)">currentColor</code> — adapts to every theme</h4>
  <div class="grid" id="g"></div>
</section>

<section>
  <h4>Same icon on every theme surface — contrast check</h4>
  <div class="swatch">
    <div class="sw b1"><span class="ico" style="-webkit-mask-image:url(../assets/icons/svg/Wallet.svg);mask-image:url(../assets/icons/svg/Wallet.svg)"></span><span class="n">bg</span></div>
    <div class="sw b2"><span class="ico" style="-webkit-mask-image:url(../assets/icons/svg/Wallet.svg);mask-image:url(../assets/icons/svg/Wallet.svg)"></span><span class="n">bg-2</span></div>
    <div class="sw b3"><span class="ico" style="-webkit-mask-image:url(../assets/icons/svg/Wallet.svg);mask-image:url(../assets/icons/svg/Wallet.svg)"></span><span class="n">bg-3</span></div>
    <div class="sw bi"><span class="ico" style="-webkit-mask-image:url(../assets/icons/svg/Wallet.svg);mask-image:url(../assets/icons/svg/Wallet.svg)"></span><span class="n">fg</span></div>
    <div class="sw br"><span class="ico" style="-webkit-mask-image:url(../assets/icons/svg/Wallet.svg);mask-image:url(../assets/icons/svg/Wallet.svg)"></span><span class="n">brand</span></div>
    <div class="sw ac"><span class="ico" style="-webkit-mask-image:url(../assets/icons/svg/Wallet.svg);mask-image:url(../assets/icons/svg/Wallet.svg)"></span><span class="n">accent</span></div>
  </div>
</section>

<script>
  const icons=["Home","Search","Bell","User","Users","Settings","Wallet","CreditCard",
    "ArrowRight","ArrowUp","ArrowDown","ArrowLeft","Check","X","Plus","Minus",
    "Copy","ExternalLink","Eye","EyeOff","Lock","Filter","Refresh","Share",
    "Send","Download","Calendar","Gift","Bell","Info","AlertCircle","CheckCircle"];
  const map={Send:"ArrowRight"};
  const g=document.getElementById('g');
  [...new Set(icons)].forEach(n=>{
    const real=map[n]||n;
    const c=document.createElement('div');c.className='cell';
    c.innerHTML=`<span class="ico" style="-webkit-mask-image:url(../assets/icons/svg/${real}.svg);mask-image:url(../assets/icons/svg/${real}.svg)"></span><div class="lab">${n}</div>`;
    g.appendChild(c);
  });
</script>
<script src="theme-switcher.js" defer></script>
</body></html>
