<!doctype html>
<html lang="en"><head><meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Revenant — Form Primitives</title>
<style>
  :root{
    --concrete:#EDE9E5; --ink:#111111; --accent:#E05A2B;
    --hair:#C9C3BA; --muted:#6B6358;
    --font-mono:"IBM Plex Mono",ui-monospace,SFMono-Regular,Menlo,monospace;
    --font-sans:"Aeonik","Inter",system-ui,-apple-system,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;background:#dedad3;color:var(--ink);font-family:var(--font-sans);padding:28px;font-feature-settings:"tnum" 1}
  .sheet{position:relative;max-width:1080px;margin:0 auto;background:var(--concrete);padding:30px 34px 22px;border:1px dashed var(--muted)}
  .corner{position:absolute;width:18px;height:18px}
  .tl{top:-9px;left:-9px}.tr{top:-9px;right:-9px}.bl{bottom:-9px;left:-9px}.br{bottom:-9px;right:-9px}
  .hdr{display:flex;align-items:baseline;gap:14px;border-bottom:1.5px solid var(--ink);padding-bottom:9px;margin-bottom:2px}
  .hdr .ref{font-family:var(--font-mono);font-size:11px;font-weight:600;letter-spacing:.05em;border:1px solid var(--ink);padding:1px 6px}
  .hdr h1{font-size:14px;letter-spacing:.18em;text-transform:uppercase;font-weight:600;margin:0}
  .sub{font-family:var(--font-mono);font-size:10px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin:8px 0 18px}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .panel{border:1px solid var(--hair)}
  .panel-h{display:flex;justify-content:space-between;align-items:baseline;border-bottom:1px solid var(--hair);padding:8px 12px;font-family:var(--font-mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
  .panel-h .t{color:var(--ink);font-weight:600}
  .panel svg{display:block;width:100%;height:auto}
  text{font-family:var(--font-mono)}
  @keyframes spin{to{transform:rotate(360deg)}}
  .spin{transform-origin:210px 210px;animation:spin 36s linear infinite}
  @media(prefers-reduced-motion:reduce){.spin{animation:none}}
  .tblock{margin-top:18px;border:1.5px solid var(--ink);display:grid;grid-template-columns:1fr 150px 70px;font-family:var(--font-mono);font-size:10px}
  .tblock div{border-left:1px solid var(--ink);padding:6px 9px}
  .tblock div:first-child{border-left:none}
  .tblock .k{color:var(--muted);letter-spacing:.08em;text-transform:uppercase;display:block;font-size:8.5px}
  .tblock .big{font-family:var(--font-sans);font-size:13px;font-weight:600;letter-spacing:.06em;text-transform:uppercase}
  .rev{color:var(--accent);font-weight:600;font-size:13px}
</style></head>
<body>
<div class="sheet">
  <span class="corner tl"><svg viewBox="0 0 40 40"><circle cx="20" cy="20" r="9" fill="none" stroke="#6B6358" stroke-width="1.2"/><path d="M20 4V36M4 20H36" stroke="#6B6358" stroke-width="1.2"/></svg></span>
  <span class="corner tr"><svg viewBox="0 0 40 40"><circle cx="20" cy="20" r="9" fill="none" stroke="#6B6358" stroke-width="1.2"/><path d="M20 4V36M4 20H36" stroke="#6B6358" stroke-width="1.2"/></svg></span>
  <span class="corner bl"><svg viewBox="0 0 40 40"><circle cx="20" cy="20" r="9" fill="none" stroke="#6B6358" stroke-width="1.2"/><path d="M20 4V36M4 20H36" stroke="#6B6358" stroke-width="1.2"/></svg></span>
  <span class="corner br"><svg viewBox="0 0 40 40"><circle cx="20" cy="20" r="9" fill="none" stroke="#6B6358" stroke-width="1.2"/><path d="M20 4V36M4 20H36" stroke="#6B6358" stroke-width="1.2"/></svg></span>

  <div class="hdr"><span class="ref">REF-01/02</span><h1>Form primitives</h1></div>
  <div class="sub">Revenant apparatus · pictorial bodies in $0 SVG (Flora-rich variants are cached bases) · token-themeable</div>

  <div class="row2">
    <!-- lifecycle orbit -->
    <div class="panel">
      <div class="panel-h"><span class="t">Lifecycle orbit</span><span>REF-02 · orbit-v1.0</span></div>
      <svg viewBox="0 0 420 430">
        <!-- concentric rings -->
        <circle cx="210" cy="210" r="160" fill="none" stroke="var(--hair)" stroke-width="1"/>
        <circle cx="210" cy="210" r="115" fill="none" stroke="var(--ink)" stroke-width="1" stroke-dasharray="2 5"/>
        <circle cx="210" cy="210" r="70" fill="none" stroke="var(--ink)" stroke-width="1.2"/>
        <!-- rotating scan arc (accent) -->
        <g class="spin"><path d="M210 50 A160 160 0 0 1 323 97" fill="none" stroke="var(--accent)" stroke-width="2"/></g>
        <!-- degree ticks -->
        <g stroke="var(--muted)" stroke-width="1">
          <path d="M210 50V40M365 210h10M210 370v10M55 210H45"/>
          <path d="M320 100l7-7M320 320l7 7M100 320l-7 7M100 100l-7-7" stroke-width=".8"/>
        </g>
        <g font-size="9" fill="var(--muted)" text-anchor="middle">
          <text x="210" y="32">00</text><text x="388" y="213">90</text>
          <text x="210" y="398">180</text><text x="28" y="213">270</text>
          <text x="338" y="84">45</text><text x="338" y="344">135</text>
          <text x="82" y="344">225</text><text x="82" y="84">315</text>
        </g>
        <!-- states -->
        <text x="210" y="92" font-size="13" font-weight="600" fill="var(--accent)" text-anchor="middle">BIRTH</text>
        <text x="210" y="108" font-size="8.5" fill="var(--muted)" text-anchor="middle">STATE: INIT · T+00:00:00</text>
        <text x="210" y="206" font-size="13" font-weight="600" fill="var(--ink)" text-anchor="middle">OPERATION</text>
        <text x="210" y="222" font-size="8.5" fill="var(--muted)" text-anchor="middle">STATE: ACTIVE · T+RUN</text>
        <text x="210" y="330" font-size="13" font-weight="600" fill="var(--accent)" text-anchor="middle">TERMINATION</text>
        <text x="210" y="346" font-size="8.5" fill="var(--muted)" text-anchor="middle">STATE: FINAL · T+END</text>
        <!-- checkpoint + telemetry markers on mid ring -->
        <g stroke="var(--ink)" stroke-width="1" fill="none">
          <g transform="translate(325,210)"><circle r="5"/><path d="M0 -7V7M-7 0H7"/></g>
          <circle cx="95" cy="210" r="4"/>
        </g>
        <path d="M283 287l8 8M291 287l-8 8" stroke="var(--accent)" stroke-width="1.4"/>
        <text x="210" y="418" font-size="8.5" fill="var(--muted)" text-anchor="middle">⊕ checkpoint   ○ telemetry beat   × termination</text>
      </svg>
    </div>

    <!-- exploded stack -->
    <div class="panel">
      <div class="panel-h"><span class="t">Exploded stack</span><span>REF-01 · iso-exp-01 · 1:2</span></div>
      <svg viewBox="0 0 420 430">
        <line x1="150" y1="40" x2="150" y2="400" stroke="var(--muted)" stroke-width="1" stroke-dasharray="3 4"/>
        <g fill="none" stroke="var(--ink)" stroke-width="1.3">
          <path d="M70 64l120 0 60 24-120 0z"/>
          <path d="M70 108l120 0 60 24-120 0z"/>
          <path d="M70 196l120 0 60 24-120 0z"/>
          <path d="M70 240l120 0 60 24-120 0z"/>
          <path d="M70 284l120 0 60 24-120 0z"/>
          <path d="M70 328l120 0 60 24-120 0z"/>
          <path d="M70 372l120 0 60 24-120 0z"/>
        </g>
        <!-- accent active layer (decision core) -->
        <path d="M78 154l110 0 52 21-110 0z" fill="var(--accent)" fill-opacity="0.16" stroke="var(--accent)" stroke-width="1.3"/>
        <!-- registration marks -->
        <g stroke="var(--muted)" stroke-width="1" fill="none">
          <g transform="translate(46,52)"><circle r="7"/><path d="M0 -10V10M-10 0H10"/></g>
          <g transform="translate(46,396)"><circle r="7"/><path d="M0 -10V10M-10 0H10"/></g>
        </g>
        <!-- leader callouts -->
        <g stroke="var(--ink)" stroke-width=".8"><path d="M250 76H300M250 120H300M240 165H300M250 252H300M250 296H300M250 340H300M250 384H300"/></g>
        <circle cx="240" cy="165" r="2.4" fill="var(--accent)"/>
        <g font-size="9.5" fill="var(--ink)">
          <text x="306" y="79">01 sensor suite</text>
          <text x="306" y="123">02 signal processor</text>
          <text x="306" y="168" fill="var(--accent)">03 decision core</text>
          <text x="306" y="255">05 routing iface</text>
          <text x="306" y="299">06 telemetry bus</text>
          <text x="306" y="343">07 power watchdog</text>
          <text x="306" y="387">08 chassis</text>
        </g>
        <!-- datum -->
        <g transform="translate(40,210)"><rect x="-12" y="-10" width="24" height="20" fill="none" stroke="var(--ink)" stroke-width="1"/><text x="0" y="5" font-size="12" text-anchor="middle">A</text><path d="M16 0H30" stroke="var(--ink)" stroke-width="1"/><path d="M30 0l9 -5v10z" fill="var(--ink)"/></g>
      </svg>
    </div>
  </div>

  <div class="tblock">
    <div><span class="k">Project</span><span class="big">Revenant apparatus</span></div>
    <div><span class="k">Doc no.</span>RA-VD-0004<br/><span class="k" style="margin-top:4px">Date</span>2026-06-21</div>
    <div><span class="k">Rev</span><span class="rev">0.1</span></div>
  </div>
</div>
</body></html>
