<!doctype html>
<html lang="en"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<link rel="stylesheet" href="theme-switcher.css"/>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Serif+Display&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&family=Fraunces:opsz,wght,SOFT@9..144,400,50;9..144,500,50;9..144,600,50&family=Archivo:wght@400;500;700;900&family=Outfit:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&family=Syne:wght@500;700;800&family=VT323&family=Rubik+Mono+One&family=Major+Mono+Display&family=Unbounded:wght@400;700;800&family=Doto:wght@400;700&family=Bricolage+Grotesque:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  body{margin:0;background:var(--bg);padding:60px 24px 24px;font-family:var(--font-sans);color:var(--fg);min-height:100vh}
  .row{display:flex;align-items:baseline;gap:16px;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--line-2)}
  .row:last-child{border-bottom:none}
  .lab{font-family:var(--font-mono);font-size:11px;color:var(--fg-3);min-width:120px;flex-shrink:0}
  .disp{font-family:var(--font-display);line-height:1;color:var(--fg)}
</style></head><body data-theme="lore-light">
<div class="row"><div class="lab">display/lg · 66</div><div class="disp" style="font-size:66px;font-weight:400;letter-spacing:-.02em">Launch a bank</div></div>
<div class="row"><div class="lab">display/md · 52</div><div class="disp" style="font-size:52px;font-weight:400;letter-spacing:-.015em">Move money, globally</div></div>
<div class="row"><div class="lab">display/sm · 40</div><div class="disp" style="font-size:40px;font-weight:500">Your squad, your vault</div></div>
<div class="row"><div class="lab">display/xs · 32</div><div class="disp" style="font-size:32px;font-weight:500">Save, spend, send</div></div>
<script src="theme-switcher.js" defer></script>
</body></html>
