<!doctype html>
<html lang="en"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<link rel="stylesheet" href="theme-switcher.css"/>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=DM+Serif+Display&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,400;9..144,500&family=Archivo:wght@400;500;700&family=Outfit:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&family=Syne:wght@500;700&family=VT323&family=Major+Mono+Display&family=Unbounded:wght@400;700&family=Doto&family=Bricolage+Grotesque:wght@400;600&display=swap" rel="stylesheet">
<style>
  body{margin:0;background:var(--bg);padding:60px 24px 24px;font-family:var(--font-sans);color:var(--fg);min-height:100vh}
  .row{display:flex;align-items:baseline;gap:16px;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--line-2)}
  .row:last-child{border-bottom:none}
  .lab{font-family:var(--font-mono);font-size:11px;color:var(--fg-3);min-width:130px;flex-shrink:0}
  .h{color:var(--fg);line-height:1.2}
</style></head><body data-theme="lore-light">
<div class="row"><div class="lab">header/xl · 32 / 700</div><div class="h" style="font-size:32px;font-weight:700">Balance overview</div></div>
<div class="row"><div class="lab">header/lg · 28 / 700</div><div class="h" style="font-size:28px;font-weight:700">Active proposals</div></div>
<div class="row"><div class="lab">header/md · 25 / 700</div><div class="h" style="font-size:25px;font-weight:700">Save vault details</div></div>
<div class="row"><div class="lab">header/sm · 22 / 700</div><div class="h" style="font-size:22px;font-weight:700">Members (12)</div></div>
<div class="row"><div class="lab">header/xs · 20 / 700</div><div class="h" style="font-size:20px;font-weight:700">Recent transactions</div></div>
<div class="row"><div class="lab">header/caps · 12 / 700</div><div class="h" style="font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--fg-3)">section label</div></div>
<script src="theme-switcher.js" defer></script>
</body></html>
